<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#050811" />
    </linearGradient>

    <!-- Outer Glow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Metallic Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff2a3" />
      <stop offset="40%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#ff8c00" />
    </linearGradient>

    <!-- Cyan Neon Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc" />
      <stop offset="50%" stop-color="#00f5d4" />
      <stop offset="100%" stop-color="#0077b6" />
    </linearGradient>

    <!-- Helmet Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#002b49" stop-opacity="0.95" />
    </linearGradient>
  </defs>

  <!-- Rounded App Icon Base Panel -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bgGrad)" stroke="url(#cyanGrad)" stroke-width="2.5" filter="url(#neonGlow)" />
  
  <!-- Subtly Glowing Inner Border Ring -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-opacity="0.6" />

  <!-- Background Speed Motion Rays -->
  <path d="M 20 95 L 45 40 L 52 40 L 27 95 Z" fill="url(#cyanGrad)" opacity="0.2" />
  <path d="M 32 98 L 60 30 L 68 30 L 40 98 Z" fill="url(#goldGrad)" opacity="0.25" />
  <path d="M 100 35 L 75 90 L 68 90 L 93 35 Z" fill="url(#cyanGrad)" opacity="0.2" />

  <!-- Central Cyber Racing Helmet / Supercar Emblem Graphic -->
  <g transform="translate(64, 62) scale(0.95)">
    <!-- Helmet Main Outer Shell -->
    <path d="M -34 -15 C -34 -42, 34 -42, 34 -15 C 34 15, 24 38, 0 44 C -24 38, -34 15, -34 -15 Z" fill="url(#bgGrad)" stroke="url(#goldGrad)" stroke-width="4.5" filter="url(#neonGlow)" />
    
    <!-- Neon Cyber Visor Shield -->
    <path d="M -26 -12 C -24 -28, 24 -28, 26 -12 C 28 4, 18 16, 0 20 C -18 16, -28 4, -26 -12 Z" fill="url(#shieldGrad)" stroke="url(#cyanGrad)" stroke-width="3" />

    <!-- Visor Laser Highlight Line -->
    <path d="M -20 -18 Q 0 -26 20 -18" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" opacity="0.85" />
    
    <!-- Cyber Aerodynamic Chin Vents -->
    <path d="M -12 28 L 0 36 L 12 28" fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Lightning Thunderbolt Center Symbol -->
    <path d="M 2 -38 L -6 -18 L 0 -18 L -2 -2 L 8 -22 L 2 -22 Z" fill="url(#goldGrad)" filter="url(#neonGlow)" />
  </g>
</svg>
